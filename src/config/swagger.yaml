openapi: 3.0.3

info:
  title: Patient Management System API
  version: 1.0.0
  description: |
    Full Hospital Management System API.

    Modules Included:
    - Authentication
    - Hospitals & Admin
    - Patients
    - Visits
    - Triage
    - Diagnosis
    - Lab Orders & Results
    - Pharmacy & Prescriptions
    - Billing & Payments
    - Insurance Claims
    - Bed & Admission Management
    - Maternal Health (Antenatal, Delivery, Postnatal, Abortion)
    - Referrals
    - Queue System
    - Audit Logs
    - Reporting & Analytics

servers:
  - url: http://localhost:3004/api
    description: Local
  - url: https://patient-management-system-6jvc.onrender.com/api
    description: Production

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Hospitals
  - name: Users
  - name: Patients
  - name: Visits
  - name: Triage
  - name: Diagnoses
  - name: Prescriptions
  - name: Medications
  - name: Pharmacy
  - name: Lab Orders
  - name: Lab Results
  - name: Billing
  - name: Payments
  - name: Insurance
  - name: Admissions
  - name: Beds
  - name: Discharges
  - name: Appointments
  - name: Antenatal
  - name: Delivery
  - name: Postnatal
  - name: Abortion
  - name: Referrals
  - name: Queue
  - name: Audit Logs
  - name: Analytics
  - name: Reporting

########################################
# PATHS
########################################

paths:

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
      responses:
        200:
          description: Login successful

  /auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUser'
      responses:
        201:
          description: User created

  /hospitals:
    post:
      tags: [Hospitals]
      summary: Create hospital

  /users:
    get:
      tags: [Users]
      summary: Get users
    post:
      tags: [Users]
      summary: Create user

  /patients:
    get:
      tags: [Patients]
      summary: Get patients
    post:
      tags: [Patients]
      summary: Create patient
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Patient'

  /visits:
    get:
      tags: [Visits]
      summary: Get visits
    post:
      tags: [Visits]
      summary: Create visit
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Visit'

  /triage:
    post:
      tags: [Triage]
      summary: Record patient vitals
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Triage'

  /diagnoses:
    post:
      tags: [Diagnoses]
      summary: Add diagnosis

  /lab-orders:
    post:
      tags: [Lab Orders]
      summary: Create lab order

  /lab-results:
    post:
      tags: [Lab Results]
      summary: Add lab result

  /prescriptions:
    post:
      tags: [Prescriptions]
      summary: Create prescription

  /dispenses:
    post:
      tags: [Pharmacy]
      summary: Dispense medication

  /medications:
    get:
      tags: [Medications]
      summary: Get medications

  /billing:
    post:
      tags: [Billing]
      summary: Create billing charge

  /payments:
    post:
      tags: [Payments]
      summary: Process payment

  /claim:
    post:
      tags: [Insurance]
      summary: Submit insurance claim

  /beds:
    get:
      tags: [Beds]
      summary: Get beds

  /admissions:
    post:
      tags: [Admissions]
      summary: Admit patient

  /discharges:
    post:
      tags: [Discharges]
      summary: Discharge patient

  /appointments:
    post:
      tags: [Appointments]
      summary: Book appointment

  /maternity/antenatal:
    post:
      tags: [Antenatal]
      summary: Record antenatal visit

  /maternity/delivery:
    post:
      tags: [Delivery]
      summary: Record delivery

  /maternity/postnatal:
    post:
      tags: [Postnatal]
      summary: Record postnatal visit

  /maternity/abortion:
    post:
      tags: [Abortion]
      summary: Record abortion case

  /referrals:
    post:
      tags: [Referrals]
      summary: Refer patient

  /queue:
    post:
      tags: [Queue]
      summary: Add patient to queue

  /audit:
    get:
      tags: [Audit Logs]
      summary: Get audit logs

  /analytics:
    get:
      tags: [Analytics]
      summary: Get system analytics

  /reporting:
    get:
      tags: [Reporting]
      summary: Generate reports

########################################
# COMPONENTS
########################################

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Login:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string

    RegisterUser:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string

    Patient:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        gender:
          type: string
          enum: [male, female]
        phone:
          type: string
        email:
          type: string
        dateOfBirth:
          type: string
          format: date

    Visit:
      type: object
      properties:
        patient:
          type: string
        doctor:
          type: string
        visitDate:
          type: string
          format: date-time
        type:
          type: string
          enum:
            - outpatient
            - inpatient
            - emergency
        notes:
          type: string

    Triage:
      type: object
      properties:
        visit:
          type: string
        temperature:
          type: number
        bloodPressure:
          type: string
        heartRate:
          type: number
        oxygenSaturation:
          type: number
        complaint:
          type: string

    Medication:
      type: object
      properties:
        name:
          type: string
        strength:
          type: string
        form:
          type: string
        stock:
          type: number

    Prescription:
      type: object
      properties:
        visit:
          type: string
        medications:
          type: array
          items:
            type: object
            properties:
              medication:
                type: string
              dosage:
                type: string
              frequency:
                type: string
              duration:
                type: string

    Billing:
      type: object
      properties:
        patient:
          type: string
        amount:
          type: number
        description:
          type: string
        status:
          type: string
          enum:
            - pending
            - paid

    InsuranceClaim:
      type: object
      properties:
        patient:
          type: string
        provider:
          type: string
        amount:
          type: number
        status:
          type: string
          enum:
            - submitted
            - approved
            - rejected